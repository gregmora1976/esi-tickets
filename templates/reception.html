<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESI - Planning caisserie</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<style>
:root{
  --bg:#f1f5f9;
  --panel:#fff;
  --line:#dbe7f0;
  --text:#0f172a;
  --muted:#64748b;
  --blue:#0ea5e9;
  --blue-dark:#0284c7;
  --event:#fde68a;
  --event-border:#f59e0b;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:var(--text);
}
.topbar{
  background:#fff;
  border-bottom:1px solid var(--line);
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  position:sticky;
  top:0;
  z-index:10;
}
.title{
  font-size:22px;
  font-weight:900;
}
.sub{
  color:var(--muted);
  font-size:13px;
  margin-top:3px;
}
.actions{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}
.btn{
  border:1px solid var(--line);
  background:#fff;
  border-radius:12px;
  padding:10px 13px;
  font-weight:800;
  cursor:pointer;
}
.btn.primary{
  background:var(--blue);
  border-color:var(--blue);
  color:#fff;
}
.month-label{
  font-size:18px;
  font-weight:900;
  min-width:180px;
  text-align:center;
}
.calendar-wrap{
  padding:14px;
}
.calendar{
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  overflow:hidden;
}
.week-head{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  border-bottom:1px solid var(--line);
  background:#f8fafc;
}
.week-head div{
  padding:12px 10px;
  font-weight:900;
  text-transform:lowercase;
  border-right:1px solid var(--line);
}
.week-head div:last-child{border-right:none}
.month-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
}
.day{
  min-height:130px;
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
  padding:8px;
  position:relative;
  background:#fff;
}
.day:nth-child(5n){border-right:none}
.day.other-month{
  background:#f8fafc;
  color:#94a3b8;
}
.day.today{
  background:#eff6ff;
}
.day-number{
  font-size:18px;
  font-weight:900;
  margin-bottom:8px;
}
.day-number.small{
  font-size:14px;
  color:#94a3b8;
}
.event{
  display:block;
  width:100%;
  border:none;
  border-left:5px solid var(--event-border);
  background:var(--event);
  color:#111827;
  border-radius:3px;
  padding:5px 6px;
  margin:4px 0;
  font-size:13px;
  line-height:1.25;
  text-align:left;
  cursor:pointer;
  font-weight:700;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}
.event:hover{
  filter:brightness(.97);
}
.empty{
  padding:24px;
  text-align:center;
  color:var(--muted);
  font-weight:700;
}
.legend{
  padding:10px 14px;
  color:var(--muted);
  font-size:13px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  background:#fff;
  border-top:1px solid var(--line);
}
@media(max-width:900px){
  .month-grid,.week-head{grid-template-columns:1fr}
  .week-head{display:none}
  .day{min-height:auto;border-right:none}
}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="title">Planning caisserie</div>
    <div class="sub">Fiches de caisse terminées, classées par date de mise à dispo</div>
  </div>
  <div class="actions">
    <button class="btn" id="prevMonth" type="button">‹ Mois précédent</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="btn" id="nextMonth" type="button">Mois suivant ›</button>
    <button class="btn primary" id="todayBtn" type="button">Aujourd'hui</button>
    <button class="btn" id="refreshBtn" type="button">Rafraîchir</button>
  </div>
</div>

<div class="calendar-wrap">
  <div class="calendar">
    <div class="week-head">
      <div>lundi</div>
      <div>mardi</div>
      <div>mercredi</div>
      <div>jeudi</div>
      <div>vendredi</div>
    </div>
    <div class="month-grid" id="monthGrid"></div>
    <div class="legend">
      <div>Affichage : uniquement les fiches de caisse terminées</div>
      <div>Format affiché : N° dossier - N° caisse</div>
    </div>
  </div>
</div>

<script>
let currentDate = new Date();
let tickets = [];

function pad(n){ return String(n).padStart(2,'0'); }
function isoDate(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function labelMonth(d){
  return d.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
}
function startOfCalendar(monthDate){
  const first = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
  const day = first.getDay() || 7;
  const start = new Date(first);
  start.setDate(first.getDate() - (day - 1));
  return start;
}
function endOfCalendar(monthDate){
  const last = new Date(monthDate.getFullYear(), monthDate.getMonth()+1, 0);
  const day = last.getDay() || 7;
  const end = new Date(last);
  end.setDate(last.getDate() + (5 - day));
  return end;
}
function isWeekday(d){
  const day = d.getDay();
  return day >= 1 && day <= 5;
}
function displayTicket(t){
  const dossier = t.dossier || '-';
  const ref = t.ref || '-';
  return `${dossier} - ${ref}`;
}
function groupTickets(){
  const grouped = {};
  tickets
    .filter(t => 
      t.module === 'Fiche de caisse' &&
      t.status === 'Terminé' &&
      t.dateEmballage &&
      t.dateEmballage !== '-'
    )
    .forEach(t => {
      if(!grouped[t.dateEmballage]) grouped[t.dateEmballage] = [];
      grouped[t.dateEmballage].push(t);
    });
  return grouped;
}
async function loadTickets(){
  const res = await fetch('/api/tickets');
  tickets = await res.json();
  renderCalendar();
}
function renderCalendar(){
  const grid = document.getElementById('monthGrid');
  const monthLabel = document.getElementById('monthLabel');
  monthLabel.textContent = labelMonth(currentDate);
  grid.innerHTML = '';

  const grouped = groupTickets();
  const start = startOfCalendar(currentDate);
  const end = endOfCalendar(currentDate);
  const today = isoDate(new Date());

  let d = new Date(start);

  while(d <= end){
    if(isWeekday(d)){
      const dateKey = isoDate(d);
      const day = document.createElement('div');
      day.className = 'day';
      if(d.getMonth() !== currentDate.getMonth()) day.classList.add('other-month');
      if(dateKey === today) day.classList.add('today');

      const num = document.createElement('div');
      num.className = d.getMonth() !== currentDate.getMonth() ? 'day-number small' : 'day-number';
      num.textContent = d.getDate() === 1
        ? d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})
        : d.getDate();
      day.appendChild(num);

      const dayTickets = grouped[dateKey] || [];
      dayTickets
        .sort((a,b)=>displayTicket(a).localeCompare(displayTicket(b)))
        .forEach(t=>{
          const event = document.createElement('button');
          event.className = 'event';
          event.type = 'button';

          const fiche = t.fiche || {};

          const dimensions =
            `${fiche.longueur || '-'}x${fiche.largeur || '-'}x${fiche.hauteur || '-'}`;

          const caissierNom = fiche.choixCaissier || '-';
          const caissier = caissierNom.toLowerCase();

          event.textContent =
            `${t.dossier || '-'}-${t.ref || '-'} / ${dimensions} / ${caissierNom}`;

          event.title = event.textContent;

          if(caissier.includes('secobois')){
            event.style.background = '#fed7aa';
            event.style.borderLeft = '5px solid #ea580c';
          }

          if(caissier.includes('arckx')){
            event.style.background = '#bbf7d0';
            event.style.borderLeft = '5px solid #15803d';
          }

          event.addEventListener('click',()=>alert(displayTicket(t)));
          day.appendChild(event);
        });

      grid.appendChild(day);
    }
    d.setDate(d.getDate()+1);
  }
}
document.getElementById('prevMonth').addEventListener('click',()=>{
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1);
  renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click',()=>{
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1);
  renderCalendar();
});
document.getElementById('todayBtn').addEventListener('click',()=>{
  currentDate = new Date();
  renderCalendar();
});
document.getElementById('refreshBtn').addEventListener('click', loadTickets);

loadTickets();
setInterval(loadTickets, 30000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ESI Tickets - Chargement</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(180deg,#eef6fb,#f6f8fb);
    font-family:Arial,Helvetica,sans-serif;
}
.box{text-align:center;}
.logo{
    width:260px;
    margin-bottom:25px;
    animation:float 2s ease-in-out infinite;
}
.loader{
    width:60px;
    height:60px;
    border:7px solid #dbe7f0;
    border-top:7px solid #0284c7;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 25px auto;
}
h1{color:#0284c7;margin:0;font-size:34px;}
p{color:#64748b;margin-top:12px;font-size:18px;}
.small{font-size:13px;color:#94a3b8;margin-top:10px;}
@keyframes spin{100%{transform:rotate(360deg);}}
@keyframes float{0%{transform:translateY(0px);}50%{transform:translateY(-8px);}100%{transform:translateY(0px);}}
</style>
<script>
let essais = 0;
const urlDemandeur = "http://127.0.0.1:5050/demandeur";

function testerApplication(){
    essais++;

    /*
      On teste si Flask répond.
      mode:"no-cors" évite les blocages CORS depuis une page locale file://.
      Dès que le serveur répond, on remplace cette page de chargement par la page demandeur.
      Résultat : il ne reste pas de page de chargement ouverte.
    */
    fetch(urlDemandeur, { method: "GET", mode: "no-cors", cache: "no-store" })
        .then(function(){
            window.location.replace(urlDemandeur);
        })
        .catch(function(){
            relancerTest();
        });
}

function relancerTest(){
    if(essais < 60){
        setTimeout(testerApplication, 1000);
    } else {
        document.getElementById("message").innerHTML =
            "L'application met plus de temps que prévu à démarrer.<br>Merci de patienter ou de relancer si rien ne se passe.";
    }
}

setTimeout(testerApplication, 500);
</script>
</head>
